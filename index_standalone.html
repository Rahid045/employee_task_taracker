<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Task Tracker - Dashboard</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1>Task Dashboard</h1>
            <div class="header-actions">
                <span id="welcome-message">Welcome</span>
                <a href="logout.php" class="button secondary">Logout</a>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="panel summary-panel">
            <div class="summary-card">
                <h2>Open Tasks</h2>
                <p id="open-count">0</p>
            </div>
            <div class="summary-card">
                <h2>Completed</h2>
                <p id="completed-count">0</p>
            </div>
            <div class="summary-card">
                <h2>Overdue</h2>
                <p id="overdue-count">0</p>
            </div>
            <div class="summary-card" id="create-task-card" style="display: none;">
                <h2><a class="link-button" href="task_create_standalone.html">Create Task</a></h2>
                <p>&nbsp;</p>
            </div>
        </section>

        <div id="flash-message" style="display: none;"></div>

        <section class="panel task-table-panel">
            <div class="task-list-header">
                <div>
                    <h2>Task List</h2>
                </div>
                <form class="search-bar" method="get" action="index.php">
                    <input type="text" id="search-input" name="search" placeholder="Search tasks by title, description, or assignee">
                    <button class="button secondary" type="submit">Search</button>
                </form>
            </div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Assigned</th>
                            <th>Status</th>
                            <th>Priority</th>
                            <th>Due Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tasks-tbody">
                        <tr>
                            <td colspan="6" style="text-align: center;">Loading tasks...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="assets/app.js"></script>
    <script>
        // This loads data from the PHP backend
        // In a real application, you would fetch from an API endpoint
        // For now, this file connects to your PHP backend via forms and redirects
        
        console.log('Dashboard loaded. Connect to index.php for dynamic data.');
        
        // When this HTML is accessed, you should typically redirect to index.php
        // unless you have an API endpoint to fetch data from
        window.location.href = 'index.php';
    </script>
</body>
</html>
