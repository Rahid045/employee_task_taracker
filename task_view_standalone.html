<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Task - Employee Task Tracker</title>
    <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
    <main class="container">
        <div class="view-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 id="task-title">Task Title</h1>
            <a class="button secondary" href="index.php">Back to Dashboard</a>
        </div>

        <section class="panel">
            <div class="grid-2">
                <div>
                    <h2>Task Details</h2>
                    <p id="task-description">No description</p>
                </div>
                <div class="details-box">
                    <p><strong>Assigned To:</strong> <span id="assigned-to">Unassigned</span></p>
                    <p><strong>Status:</strong> <span id="task-status">New</span></p>
                    <p><strong>Priority:</strong> <span id="task-priority">Medium</span></p>
                    <p><strong>Start Date:</strong> <span id="start-date">None</span></p>
                    <p><strong>Due Date:</strong> <span id="due-date">None</span></p>
                    <p><strong>Estimated Hours:</strong> <span id="estimated-hours">0</span></p>
                    <p><strong>Actual Hours:</strong> <span id="actual-hours">0</span></p>
                </div>
            </div>
            <div style="margin-top: 20px;">
                <a class="button secondary" href="task_edit_standalone.html" id="edit-btn" style="display: none;">Edit Task</a>
                <button class="button danger" id="delete-btn" style="display: none;">Delete Task</button>
            </div>
        </section>

        <section class="panel">
            <h2>Comments</h2>
            <ul class="comment-list" id="comments-list">
                <li>No comments yet.</li>
            </ul>

            <form method="post" action="task_view.php" class="inline-form" id="comment-form" style="display: none;">
                <input type="hidden" name="action" value="comment">
                <input type="hidden" name="id" id="task-id" value="">
                <label for="comment_body">Add a comment</label>
                <textarea id="comment_body" name="comment_body" rows="3" required placeholder="Enter your comment"></textarea>
                <button class="button primary" type="submit">Post Comment</button>
            </form>
        </section>

        <section class="panel">
            <h2>Time Entries</h2>
            <div id="time-entries-list">
                <p>No time entries recorded.</p>
            </div>

            <form method="post" action="task_view.php" class="inline-form" id="time-entry-form" style="display: none;">
                <input type="hidden" name="action" value="time_entry">
                <input type="hidden" name="id" id="task-id-time" value="">
                <label for="hours">Hours</label>
                <input type="number" id="hours" name="hours" step="0.25" required min="0" placeholder="Enter hours">
                <label for="notes">Notes</label>
                <textarea id="notes" name="notes" rows="2" placeholder="Enter notes (optional)"></textarea>
                <button class="button primary" type="submit">Add Time Entry</button>
            </form>
        </section>
    </main>

    <script>
        // Get task ID from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const taskId = urlParams.get('id');

        if (!taskId) {
            alert('No task ID provided');
            window.location.href = 'index.php';
        }

        document.getElementById('task-id').value = taskId;
        document.getElementById('task-id-time').value = taskId;

        // Update edit button link with task ID
        document.getElementById('edit-btn').href = 'task_edit_standalone.html?id=' + taskId;

        // Delete task handler
        document.getElementById('delete-btn').addEventListener('click', function() {
            if (confirm('Are you sure you want to delete this task?')) {
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = 'task_delete.php';
                
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'id';
                input.value = taskId;
                
                form.appendChild(input);
                document.body.appendChild(form);
                form.submit();
            }
        });

        console.log('View task page loaded. Connect to task_view.php?id=' + taskId + ' for dynamic data.');
        
        // Redirect to PHP backend to fetch data
        window.location.href = 'task_view.php?id=' + taskId;
    </script>
</body>
</html>
